                    const train = trainSchedules[selectedLine]?.find(t => t.id === selectedTrain);
                    if (train) {
                        if (train.stops && train.stops.length > 0) {
                            return allStations.filter(s => train.stops.includes(s.name));
                        } else {
                            const startIdx = allStations.findIndex(s => s.name === train.origin);
                            const endIdx = allStations.findIndex(s => s.name === train.dest);
                            if (startIdx !== -1 && endIdx !== -1) {
                                const minIdx = Math.min(startIdx, endIdx);
                                const maxIdx = Math.max(startIdx, endIdx);
                                return allStations.slice(minIdx, maxIdx + 1);
                            }
                        }
                    }
                }
                return allStations;
            }, [selectedLine, selectedTrain]);

            // คำนวณระยะทางเมื่อเปลี่ยนสถานี
            useEffect(() => {
                if (inputMode === "station" && selectedLine) {
                    if (trainOrigin && trainDest) {
                        const getKm = (name) => trainData[selectedLine].stations.find((s) => s.name === name)?.km || 0;
                        const tDist = Math.abs(getKm(trainDest) - getKm(trainOrigin));
                        setTotalDistance(tDist.toString());
                    } else { setTotalDistance(""); }
                    if (passOrigin && passDest) {
                        const getKm = (name) => trainData[selectedLine].stations.find((s) => s.name === name)?.km || 0;
                        const pDist = Math.abs(getKm(passDest) - getKm(passOrigin));
                        setPassengerDistance(pDist.toString());
                    } else { setPassengerDistance(""); }
                }
            }, [inputMode, selectedLine, trainOrigin, trainDest, passOrigin, passDest]);

            // คำนวณวันจอง
            useEffect(() => {
                if (!travelDate || !totalDistance || !passengerDistance) { setResult(null); return; }
                const total = parseFloat(totalDistance);
                const passenger = parseFloat(passengerDistance);
                if (total <= 0 || passenger <= 0 || passenger > total) { 
                    setResult({ error: "กรุณาระบุระยะทางให้ถูกต้อง (ระยะทางที่เดินทางต้องไม่เกินระยะทางขบวนรถ)" }); 
                    return; 
                }
                const percentage = (passenger / total) * 100;
                const advanceDays = (percentage >= 60) ? 90 : (percentage >= 25) ? 30 : 1;
                const tDate = new Date(travelDate);
                const bDate = new Date(tDate);
                bDate.setDate(tDate.getDate() - advanceDays);
                const isEast = inputMode === "station" && selectedLine === "east" && selectedTrain !== "997/998";
                setResult({ percentage: percentage.toFixed(2), advanceDays, bookingDate: bDate, travelDate: tDate, isEast, error: null });
            }, [travelDate, totalDistance, passengerDistance, selectedTrain, selectedLine, inputMode]);

            const formatDate = (date) => date.toLocaleDateString("th-TH", { year: "numeric", month: "long", day: "numeric" });

            return (
                <div className="min-h-screen py-10 px-4 font-sans bg-slate-100 flex items-center justify-center">
                    <div className="w-full max-w-xl bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
                        
                        <div className="bg-gradient-to-r from-srtblue-800 to-srtblue-900 text-white p-6 shadow-md relative text-center">
                            <img src="https://i.postimg.cc/52XWNS0X/2023-03-07-104635-007734railway-Logo.png" alt="SRT Logo" className="w-16 h-16 mx-auto mb-3 drop-shadow-lg bg-white rounded-full p-1" />
                            <h1 className="text-xl sm:text-2xl font-black mb-1 tracking-tight text-white leading-tight">เครื่องมือคำนวณวันจองตั๋วรถไฟล่วงหน้า</h1>
                            <p className="text-srtblue-200 text-[10px] sm:text-xs font-bold uppercase tracking-widest mt-1">(อัปเดตเกณฑ์ใหม่ 90 วัน)</p>
                        </div>

                        <div className="p-6 space-y-6">
                            <div className="space-y-4">
                                <div>
                                    <label className="text-sm font-bold text-slate-700 mb-1.5 flex items-center"><Calendar size={18} className="mr-2 text-srtblue-600" /> วันที่ต้องการเดินทาง</label>
                                    <input type="date" className="w-full px-4 py-3 rounded-2xl border-2 border-slate-200 focus:border-srtblue-500 transition-all outline-none bg-slate-50 font-bold text-slate-700 shadow-sm" value={travelDate} onChange={(e) => setTravelDate(e.target.value)} />
                                </div>

                                <div className="bg-slate-100 p-1.5 rounded-2xl flex border border-slate-200 shadow-inner">
                                    <button onClick={() => {setInputMode("manual"); setSelectedTrain("");}} className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all ${inputMode === "manual" ? "bg-white text-srtblue-700 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}>กรอกระยะทางเอง</button>
                                    <button onClick={() => setInputMode("station")} className={`flex-1 py-2 text-sm font-bold rounded-xl transition-all flex items-center justify-center ${inputMode === "station" ? "bg-white text-srtblue-700 shadow-sm" : "text-slate-500 hover:text-slate-700"}`}><List size={16} className="mr-1.5" /> เลือกจากสถานี</button>
                                </div>

                                {inputMode === "station" && (
                                    <div className="bg-srtblue-50/40 rounded-2xl p-4 border border-srtblue-100 space-y-4 animate-in slide-in-from-top duration-300">
                                        <div>
                                            <label className="block text-xs font-black text-srtblue-800 mb-1.5 uppercase tracking-tighter text-center">เลือกสายที่ต้องการเดินทาง</label>
                                            <select className="w-full px-3 py-2.5 rounded-xl border-2 border-slate-200 focus:border-srtblue-400 outline-none text-sm bg-white font-bold text-slate-700 shadow-sm transition-all" value={selectedLine} onChange={(e) => { const line = e.target.value; setSelectedLine(line); setSelectedTrain(""); setTrainOrigin(""); setTrainDest(""); setPassOrigin(""); setPassDest(""); }}>
                                                <option value="">-- กรุณาเลือกสายรถไฟ --</option>
                                                {Object.entries(trainData).map(([key, data]) => (<option key={key} value={key}>{data.name}</option>))}
                                            </select>
                                        </div>

                                        {selectedLine && (
                                            <div className="bg-white p-3.5 rounded-xl border border-srtblue-200 shadow-sm">
                                                <label className="block text-[11px] font-black text-slate-600 mb-1.5 flex items-center"><Train size={16} className="mr-1.5 text-srtblue-600" /> ค้นหาจุดจอดตามหมายเลขขบวนรถ</label>
                                                <select className="w-full px-2 py-2 rounded-lg border border-slate-200 focus:border-srtblue-400 text-sm bg-slate-50 text-slate-700 font-bold transition-all" value={selectedTrain} onChange={(e) => {
                                                    const tId = e.target.value; setSelectedTrain(tId);
                                                    if(tId) {
                                                        const train = trainSchedules[selectedLine]?.find(t => t.id === tId);
                                                        if(train) {
                                                            let vStops = train.stops && train.stops.length > 0 ? trainData[selectedLine].stations.filter(s => train.stops.includes(s.name)).map(s => s.name) : trainData[selectedLine].stations.map(s => s.name);
                                                            let start = train.origin || vStops[0], end = train.dest || vStops[vStops.length-1];
                                                            setTrainOrigin(start); setTrainDest(end); setPassOrigin(""); setPassDest(""); 
                                                        }
                                                    } else { setTrainOrigin(""); setTrainDest(""); setPassOrigin(""); setPassDest(""); }
                                                }}>
                                                    <option value="">-- ไม่ระบุขบวน (เลือกระบุสถานีเองด้านล่าง) --</option>
                                                    {trainSchedules[selectedLine]?.map(t => (<option key={t.id} value={t.id}>ขบวน {t.name}</option>))}
                                                </select>
                                            </div>
                                        )}

                                        {selectedLine && (
                                            <div className="space-y-4 pt-2">
                                                {selectedTrain ? (
                                                    <div className="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-center shadow-sm animate-in fade-in zoom-in duration-300">
                                                        <p className="text-[10px] font-black text-emerald-700 bg-emerald-100/50 inline-block px-2.5 py-1 rounded uppercase mb-2 flex items-center justify-center w-fit mx-auto"><Lock size={12} className="mr-1" /> 1. เส้นทางเดินรถ (ล็อกอัตโนมัติ)</p>
                                                        {(() => {
                                                            const tObj = trainSchedules[selectedLine]?.find(t => t.id === selectedTrain);
                                                            if (!tObj) return null;
                                                            const ids = tObj.id.split('/');
                                                            return (
                                                                <div className="flex flex-col gap-1.5">
                                                                    <div className="flex items-center justify-between text-[11px] sm:text-xs font-bold text-slate-600 bg-white py-2 px-3 rounded-lg border border-emerald-100 shadow-sm">
                                                                        <span className="text-emerald-700 bg-emerald-100/50 px-2 py-0.5 rounded font-black w-14 text-center">ขบวน {ids[0]}</span>
                                                                        <span className="flex-1 text-right truncate">{tObj.origin}</span>
                                                                        <span className="text-slate-300 mx-2">→</span>
                                                                        <span className="flex-1 text-left truncate">{tObj.dest}</span>
                                                                    </div>
                                                                    {ids[1] && (
                                                                        <div className="flex items-center justify-between text-[11px] sm:text-xs font-bold text-slate-600 bg-white py-2 px-3 rounded-lg border border-emerald-100 shadow-sm">
                                                                            <span className="text-emerald-700 bg-emerald-100/50 px-2 py-0.5 rounded font-black w-14 text-center">ขบวน {ids[1]}</span>
                                                                            <span className="flex-1 text-right truncate">{tObj.dest}</span>
                                                                            <span className="text-slate-300 mx-2">→</span>
                                                                            <span className="flex-1 text-left truncate">{tObj.origin}</span>
                                                                        </div>
                                                                    )}
                                                                </div>
                                                            );
                                                        })()}
                                                    </div>
                                                ) : (
                                                    <div className="grid grid-cols-2 gap-3.5 pt-2 border-t border-srtblue-100 text-center">
                                                        <div className="col-span-2"><span className="text-[10px] font-black text-slate-500 bg-slate-200/50 px-2 py-1 rounded uppercase">1. ตรวจสอบขบวนรถ</span></div>
                                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-1">ต้นทางของรถ</label><select className="w-full px-2 py-2 rounded-lg border border-slate-200 text-xs bg-white font-bold" value={trainOrigin} onChange={(e) => setTrainOrigin(e.target.value)}><option value="">- เลือก -</option>{activeStations.map((s) => (<option key={`o-${s.name}`} value={s.name}>{s.name}</option>))}</select></div>
                                                        <div><label className="block text-[10px] font-bold text-slate-500 mb-1">ปลายทางของรถ</label><select className="w-full px-2 py-2 rounded-lg border border-slate-200 text-xs bg-white font-bold" value={trainDest} onChange={(e) => setTrainDest(e.target.value)}><option value="">- เลือก -</option>{activeStations.map((s) => (<option key={`d-${s.name}`} value={s.name}>{s.name}</option>))}</select></div>
                                                    </div>
                                                )}

                                                <div className="grid grid-cols-2 gap-3.5 pt-3 border-t border-srtblue-100 text-center animate-in slide-in-from-top duration-500">
                                                    <div className="col-span-2"><span className="text-[10px] font-black text-srtblue-700 bg-srtblue-100 px-2 py-1 rounded uppercase">2. ระบุสถานีที่จะเดินทาง</span></div>
                                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-1">สถานีขึ้น</label><select className="w-full px-2 py-2 rounded-lg border-2 border-slate-200 focus:border-srtblue-400 text-xs bg-white font-bold" value={passOrigin} onChange={(e) => setPassOrigin(e.target.value)}><option value="">- เลือก -</option>{activeStations.map((s) => (<option key={`po-${s.name}`} value={s.name}>{s.name}</option>))}</select></div>
                                                    <div><label className="block text-[10px] font-bold text-slate-500 mb-1">สถานีลง</label><select className="w-full px-2 py-2 rounded-lg border-2 border-slate-200 focus:border-srtblue-400 text-xs bg-white font-bold" value={passDest} onChange={(e) => setPassDest(e.target.value)}><option value="">- เลือก -</option>{activeStations.map((s) => (<option key={`pd-${s.name}`} value={s.name}>{s.name}</option>))}</select></div>
                                                </div>
                                                
                                                {totalDistance && passengerDistance && (
                                                    <div className="mt-3 py-2 px-3 bg-white rounded-xl border border-slate-200 text-center text-[10px] sm:text-xs font-bold text-slate-500 shadow-sm flex flex-col justify-center items-center">
                                                        <div className="flex justify-around w-full mb-1.5">
                                                            <div>ระยะทางขบวน: <span className="text-slate-700">{totalDistance} กม.</span></div>
                                                            <div className="text-slate-300">|</div>
                                                            <div>เดินทางจริง: <span className="text-srtblue-600">{passengerDistance} กม.</span></div>
                                                        </div>
                                                        {selectedTrain && (
                                                            <div className="text-[9px] text-emerald-600 font-medium tracking-wide">*(ระบบคำนวณหักลบระยะทางต้นทางให้อัตโนมัติแล้ว)</div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>
                                )}

                                {inputMode === "manual" && (
                                    <div className="space-y-4 animate-in fade-in duration-500 p-4 bg-slate-50 rounded-2xl border border-slate-200 shadow-inner">
                                        <div><label className="text-sm font-bold text-slate-700 mb-1.5 flex items-center"><MapPin size={18} className="mr-2 text-srtblue-600" /> ระยะทางวิ่งทั้งหมด (กม.)</label><input type="number" className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-white outline-none focus:border-srtblue-500 font-bold" value={totalDistance} onChange={(e) => setTotalDistance(e.target.value)} /></div>
                                        <div><label className="text-sm font-bold text-slate-700 mb-1.5 flex items-center"><MapPin size={18} className="mr-2 text-srtblue-600" /> ระยะทางเดินทางจริง (กม.)</label><input type="number" className="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-white outline-none focus:border-srtblue-500 font-bold" value={passengerDistance} onChange={(e) => setPassengerDistance(e.target.value)} /></div>
                                    </div>
                                )}
                            </div>

                            <div className="mt-6">
                                {!result ? (
                                    <div className="bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl p-8 text-center text-slate-400 shadow-inner">
                                        <Calculator size={48} className="mx-auto mb-4 opacity-20" /><p className="font-bold text-sm leading-relaxed">กรุณาระบุข้อมูลให้ครบถ้วน<br />เพื่อคำนวณวันจองให้อัตโนมัติ</p>
                                    </div>
                                ) : result.error ? (
                                    <div className="bg-red-50 text-red-600 p-5 rounded-2xl text-sm font-bold flex items-center border border-red-200 shadow-sm"><AlertCircle size={22} className="mr-3 shrink-0" /><p>{result.error}</p></div>
                                ) : result.isEast ? (
                                    <div className="rounded-3xl p-7 border bg-orange-50 border-orange-200 text-orange-900 shadow-lg animate-in zoom-in duration-300">
                                        <div className="text-center mb-6"><div className="inline-block p-4 bg-orange-100 rounded-full mb-4"><Train size={40} className="text-orange-600" /></div><h3 className="text-2xl font-black">รถไฟสายตะวันออก</h3><p className="text-xs font-bold opacity-70 uppercase mt-1">(ขบวนรถธรรมดา / ชานเมือง)</p></div>
                                        <div className="bg-white rounded-2xl p-6 shadow-sm text-center border border-orange-100"><p className="text-xl font-black text-orange-700">ซื้อได้ใน "วันเดินทาง"</p><p className="text-sm font-bold text-slate-500 mt-2">ก่อนรถออกไม่เกิน 2 ชั่วโมง</p></div>
                                    </div>
                                ) : (
                                    <div className={`rounded-3xl p-1.5 shadow-xl animate-in zoom-in duration-300 ${result.advanceDays === 90 ? "bg-gradient-to-b from-emerald-400 to-emerald-600" : result.advanceDays === 30 ? "bg-gradient-to-b from-blue-400 to-blue-600" : "bg-gradient-to-b from-slate-400 to-slate-600"}`}>
                                        <div className="bg-white rounded-[1.25rem] p-6 text-center h-full shadow-inner">
                                            <p className="text-xs font-black opacity-40 uppercase mb-2 tracking-widest">สิทธิ์การจองของท่าน</p>
                                            <div className="inline-block px-4 py-1.5 rounded-full bg-slate-100 font-black text-slate-600 text-[11px] sm:text-xs shadow-inner mb-3">เดินทาง {result.percentage}% ของขบวนรถ</div>
                                            <div className={`text-4xl sm:text-5xl font-black tracking-tighter mb-5 ${result.advanceDays === 90 ? "text-emerald-600" : result.advanceDays === 30 ? "text-blue-600" : "text-slate-600"}`}>จองล่วงหน้า {result.advanceDays} วัน</div>
                                            <div className="bg-slate-50 rounded-2xl p-5 border border-slate-100 shadow-inner">
                                                <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-tighter"><Clock size={16} className="inline mr-1.5 mb-1" /> วันที่เริ่มจองตั๋วได้คือ</p>
                                                <p className="text-2xl sm:text-3xl font-black text-slate-800 tracking-tight leading-none mb-2">{formatDate(result.bookingDate)}</p>
                                                <p className="text-[10px] text-slate-400 font-bold mb-4 italic opacity-80">(สำหรับการเดินทางวันที่ {formatDate(result.travelDate)})</p>
                                                <div className="py-2.5 px-3 bg-srtblue-50 rounded-xl border border-srtblue-100 shadow-sm inline-flex items-center justify-center w-full"><Clock size={14} className="mr-1.5 text-srtblue-600" /><span className="text-[11px] sm:text-xs font-black text-srtblue-700 tracking-wide">เริ่มจองได้ตั้งแต่เวลา 08.30 น. เป็นต้นไป</span></div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        <div className="bg-slate-50 p-6 sm:p-8 border-t-2 border-slate-100 text-[11px] sm:text-xs text-slate-600 leading-relaxed">
                            <h3 className="font-black text-slate-800 mb-4 flex items-center text-sm uppercase tracking-wide border-b pb-2"><Info size={18} className="mr-2 text-srtblue-600" /> ข้อมูลและระเบียบที่ควรทราบ</h3>
                            <div className="space-y-6">
                                <ul className="space-y-3 font-medium">
                                    <li className="flex items-start"><span className="text-srtblue-600 mr-2 mt-0.5">●</span><span><b>ตั๋วสำรองที่นั่ง (Reserved Seat):</b> ต้องแสดงบัตรประชาชนหรือกรอกเลขบัตรประชาชน (กรณีซื้อออนไลน์) ระบุ "ชื่อ-นามสกุล และเลขบัตรประชาชน หรือ Passport No. ในทุกที่นั่ง" โดยจะปรากฏอยู่บนหน้าตั๋ว</span></li>
                                    <li className="flex items-start"><span className="text-srtblue-600 mr-2 mt-0.5">●</span><span><b>ห้ามเปลี่ยนชื่อ:</b> ตั้งแต่วันที่ 01 กรกฎาคม 2567 เป็นต้นไป <u>ไม่อนุญาตให้เปลี่ยนแปลงข้อมูล ชื่อ-นามสกุล และรายละเอียดผู้เดินทาง หรือโอนสิทธิ์ให้บุคคลอื่นได้</u> หากต้องการเปลี่ยนต้องคืนตั๋ว (หักค่าธรรมเนียม) และซื้อใหม่เท่านั้น</span></li>
                                    <li className="flex items-start"><span className="text-srtblue-600 mr-2 mt-0.5">●</span><span><b>รถธรรมดา/ชานเมือง/ท้องถิ่น:</b> (Non-Reserved Seat) สามารถซื้อได้ในวันเดินทาง ก่อนรถออกไม่เกิน 2 ชั่วโมง</span></li>
                                    <li className="flex items-start"><span className="text-srtblue-600 mr-2 mt-0.5">●</span><span><b>กำหนดวันข้างต้น:</b> ให้รวมถึงการขอเปลี่ยนแปลงการเดินทางหรือคืนเงินด้วย</span></li>
                                    <li className="flex items-start"><AlertCircle size={16} className="mr-2 shrink-0 text-red-600 mt-0.5" /><span className="text-red-700 font-bold underline"><b>โปรดตรวจสอบตั๋วทันที:</b> เมื่อได้รับตั๋ว โปรดเช็กขบวนรถ/วันที่/สถานี และเงินทอน หากผิดพลาดต้องแจ้งเจ้าหน้าที่ทันที พ้นหน้าช่องจำหน่ายตั๋วแล้วจะไม่รับผิดชอบทุกกรณี</span></li>
                                </ul>
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                    <p className="font-bold text-slate-700 mb-2 border-b border-slate-100 pb-2 flex items-center"><Tag size={16} className="mr-2 text-emerald-500" /> สิทธิลดค่าโดยสารครึ่งราคา (ไม่รวมค่าธรรมเนียม)</p>
                                    <ul className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-2 font-medium">
                                        <li>1. เด็กสูงเกิน 100 ซม. แต่ไม่เกิน 150 ซม.</li>
                                        <li>2. พระภิกษุ สามเณร หรือนักบุญ</li>
                                        <li>3. ทหารในเครื่องแบบและผู้มีเหรียญกล้าหาญ</li>
                                        <li>4. กพส. , กสข. , ทบส. , มพย.</li>
